name: Release DMG

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app
      - name: Test
        run: swift test
      - name: Build universal DMG
        env:
          BUILD_NUMBER: ${{ github.run_number }}
        run: ./scripts/package-app.sh "${GITHUB_REF_NAME#v}"
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/Limiter-*.dmg \
            dist/Limiter-*.sha256 \
            --generate-notes \
            --title "Limiter $GITHUB_REF_NAME"
