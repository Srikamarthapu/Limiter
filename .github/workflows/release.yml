name: Release DMG

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app
      - name: Test
        run: swift test
      - name: Build universal DMG
        env:
          BUILD_NUMBER: ${{ github.run_number }}
        run: ./scripts/package-app.sh "${GITHUB_REF_NAME#v}"
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" \
              dist/Limiter-*.dmg \
              dist/Limiter-*.sha256 \
              --clobber
            gh release edit "$GITHUB_REF_NAME" --title "Limiter $GITHUB_REF_NAME"
          else
            gh release create "$GITHUB_REF_NAME" \
              dist/Limiter-*.dmg \
              dist/Limiter-*.sha256 \
              --generate-notes \
              --title "Limiter $GITHUB_REF_NAME"
          fi
